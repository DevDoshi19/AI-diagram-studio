server {
    listen 80;

    # -- Serve the React app -- 
    # All static files (JS, CSS, images) are served from here
    root /usr/share/nginx/html;
    index index.html;

    # -- React Router support --
    # Without this, refreshing on /generate would return 404
    # because Nginx looks for a real file at that path.
    # try_files: first try the exact file, then the exact folder,
    # then fall back to index.html and let React Router handle it.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # -- Proxy /api calls to the FastAPI backend --
    # In development, Vite handled this proxy. In production, Nginx does it.
    # "backend" here is the Docker service name — Docker resolves it automatically.
    location /api {
        proxy_pass http://backend:8000;

        # Pass the real client info to FastAPI
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Required for SSE (streaming) to work — disables response buffering
        # so chunks reach the browser immediately instead of being held
        proxy_buffering off;
        proxy_cache off;
    }
}