name: Build and Deploy

on:
  push:
    branches: [main]

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: 030987178431.dkr.ecr.ap-south-1.amazonaws.com
  BACKEND_IMAGE: ai-diagram-studio-backend
  FRONTEND_IMAGE: ai-diagram-studio-frontend
  EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        run: |
          docker build -t $ECR_REGISTRY/$BACKEND_IMAGE:latest ./backend
          docker push $ECR_REGISTRY/$BACKEND_IMAGE:latest

      - name: Build and push frontend image
        run: |
          docker build -t $ECR_REGISTRY/$FRONTEND_IMAGE:latest ./frontend
          docker push $ECR_REGISTRY/$FRONTEND_IMAGE:latest

      - name: Deploy to EC2 via SSM
        run: |
          aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy latest images" \
            --parameters commands='[
              "cd /home/ubuntu/ai-diagram-studio",
              "sudo -u ubuntu aws ecr get-login-password --region ap-south-1 | sudo -u ubuntu docker login --username AWS --password-stdin 030987178431.dkr.ecr.ap-south-1.amazonaws.com",
              "sudo -u ubuntu docker compose -f docker-compose.prod.yml pull",
              "sudo -u ubuntu docker compose -f docker-compose.prod.yml up -d"
            ]' \
            --region $AWS_REGION