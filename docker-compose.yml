services:
  db:
    image: postgres:16-alpine
    container_name: diagram_db
    environment:
      POSTGRES_USER: diagram_user
      POSTGRES_PASSWORD: diagram_pass
      POSTGRES_DB: diagram_studio
    ports:
      - "5433:5432"
    volumes:
      - diagram_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: diagram_redis
    ports:
      - "6379:6379"
    volumes:
      - diagram_redis_data:/data

volumes:
  diagram_postgres_data:
  diagram_redis_data: